    // 2. Clear service workers and caches to bypass caching of modified code
    async function cleanAndRedirect() {
      if ('serviceWorker' in navigator) {
        try {
          const registrations = await navigator.serviceWorker.getRegistrations();
          for (let reg of registrations) {
            await reg.unregister();
          }
        } catch (e) {
          console.error("Failed to unregister SW:", e);
        }
      }
      
      if ('caches' in window) {
        try {
          const names = await caches.keys();
          for (let name of names) {
            await caches.delete(name);
          }
        } catch (e) {
          console.error("Failed to delete cache:", e);
        }
      }

      // Small delay to ensure browser register update completes
      setTimeout(() => {
        window.location.href = "index.html";
      }, 500);
    }

    window.onload = cleanAndRedirect;
